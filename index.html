<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ديوانية عزيز</title>

<style>
body{
margin:0;
font-family:Tahoma,sans-serif;
background:#0d0d0d;
color:white;
text-align:center;
}

header{
padding:100px 20px;
background:linear-gradient(135deg,#7c3aed,#1a1a1a);
}

h1{
font-size:60px;
margin:0;
}

p{
font-size:20px;
color:#d1d1d1;
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:#7c3aed;
color:white;
text-decoration:none;
border-radius:10px;
}

section{
padding:60px 20px;
}

.card{
background:#161616;
padding:20px;
margin:15px auto;
max-width:700px;
border-radius:15px;
border:1px solid #7c3aed;
}
</style>
</head>

<body>

<header>
<h1>ديوانية عزيز</h1>
<p>مجتمع يجمع الأصدقاء للسوالف والفعاليات والترفيه</p>
<a class="btn" href="#">انضم إلينا</a>
</header>

<section>
<div class="card">
<h2>القوانين</h2>
<p>احترام الجميع وعدم الإساءة أو إثارة المشاكل.</p>
</div>

<div class="card">
<h2>الفعاليات</h2>
<p>فعاليات ومسابقات مستمرة لأعضاء الديوانية.</p>
</div>

<div class="card">
<h2>الإدارة</h2>
<p>فريق إداري جاهز لخدمتكم ومساعدتكم.</p>
</div>
</section>

</body>
</html>
